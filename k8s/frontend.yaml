# 1. The Network Doorway (Accessible at http://localhost:30000)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 8082
      targetPort: 80

---
# 2. The Container Manager
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: frontend:1.0.8
          imagePullPolicy: IfNotPresent  # Prevents the containerd wall error
          ports:
            - containerPort: 80